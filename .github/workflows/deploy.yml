name: Deploy to Zone

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Move files, Install & Build
        run: |
          # 1. Liigume esimesse kausta, kus asub sinu package.json
          cd ePortfolio
          
          # 2. Liigutame package failid my-portfolio kausta, et kood ja seaded oleks koos
          mv package.json ../my-portfolio/ 2>/dev/null || true
          mv package-lock.json ../my-portfolio/ 2>/dev/null || true
          
          # 3. Liigume kausta, kus on nüüd kogu su projekt koos
          cd ../my-portfolio
          
          # 4. Paigaldame ja ehitame
          npm install
          npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Kuna lõplik projekt ehitati 'my-portfolio' kaustas, asub 'dist' seal
          local-dir: ./my-portfolio/dist/
          # Zone korrektne peakaust
          server-dir: /htdocs/
          # Puhastab Zone vaikefailid
          dangerous-clean-html: true
